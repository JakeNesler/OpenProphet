name: Publish Verifiable Appliance Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. v2.0.0)'
        required: true
        type: string

jobs:
  test:
    name: Run Go & Node Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.23'

      - name: Run Go tests
        run: go test -v ./...

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'

      - name: Install Node dependencies
        run: npm ci

      - name: Run Node tests
        run: npm test

  release:
    name: Build & Release Appliance
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.23'

      - name: Determine version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            version="$INPUT_VERSION"
            if [ "$GITHUB_REF" != "refs/tags/$version" ]; then
              echo "Manual releases must be dispatched against refs/tags/$version" >&2
              exit 1
            fi
          else
            version="$REF_NAME"
          fi
          if ! printf '%s' "$version" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$'; then
            echo "Version must be an explicit v-prefixed semantic version; got: $version" >&2
            exit 1
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Cross-build openprophet launcher binaries
        run: |
          mkdir -p dist/linux_amd64 dist/linux_arm64 dist/darwin_amd64 dist/darwin_arm64 dist/windows_amd64 dist/windows_arm64

          # Linux
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags "-X main.Version=${VERSION}" -o dist/linux_amd64/openprophet ./cmd/openprophet
          tar -czf openprophet-linux-amd64.tar.gz -C dist/linux_amd64 openprophet

          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -trimpath -ldflags "-X main.Version=${VERSION}" -o dist/linux_arm64/openprophet ./cmd/openprophet
          tar -czf openprophet-linux-arm64.tar.gz -C dist/linux_arm64 openprophet

          # Darwin
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags "-X main.Version=${VERSION}" -o dist/darwin_amd64/openprophet ./cmd/openprophet
          tar -czf openprophet-darwin-amd64.tar.gz -C dist/darwin_amd64 openprophet

          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -trimpath -ldflags "-X main.Version=${VERSION}" -o dist/darwin_arm64/openprophet ./cmd/openprophet
          tar -czf openprophet-darwin-arm64.tar.gz -C dist/darwin_arm64 openprophet

          # Windows
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags "-X main.Version=${VERSION}" -o dist/windows_amd64/openprophet.exe ./cmd/openprophet
          zip -j openprophet-windows-amd64.zip dist/windows_amd64/openprophet.exe

          GOOS=windows GOARCH=arm64 CGO_ENABLED=0 go build -trimpath -ldflags "-X main.Version=${VERSION}" -o dist/windows_arm64/openprophet.exe ./cmd/openprophet
          zip -j openprophet-windows-arm64.zip dist/windows_arm64/openprophet.exe

          # Stable bootstrap asset and checksums
          cp scripts/install-appliance.sh install-appliance.sh
          sha256sum openprophet-* install-appliance.sh > checksums.txt

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Refuse to overwrite an existing image tag
        run: |
          if docker buildx imagetools inspect "ghcr.io/jakenesler/openprophet-agent:${VERSION}" >/dev/null 2>&1; then
            echo "Image tag ${VERSION} already exists; release tags are immutable." >&2
            exit 1
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        id: build-push
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/jakenesler/openprophet-agent:${{ steps.version.outputs.value }}
          provenance: true
          sbom: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign the images
        run: |
          cosign sign --yes "ghcr.io/jakenesler/openprophet-agent@${{ steps.build-push.outputs.digest }}"

      - name: Sign the binary checksums
        run: |
          cosign sign-blob --yes --bundle checksums.sigstore.json checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@fe965f7af51af5f2602596916f38a38df2e33de0 # v3.0.2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          name: Release ${{ steps.version.outputs.value }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.value, '-') }}
          overwrite_files: false
          fail_on_unmatched_files: true
          files: |
            openprophet-linux-amd64.tar.gz
            openprophet-linux-arm64.tar.gz
            openprophet-darwin-amd64.tar.gz
            openprophet-darwin-arm64.tar.gz
            openprophet-windows-amd64.zip
            openprophet-windows-arm64.zip
            install-appliance.sh
            checksums.txt
            checksums.sigstore.json
